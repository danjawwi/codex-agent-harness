model = "gpt-5.4"
model_reasoning_effort = "high"
model_context_window = 1000000
model_auto_compact_token_limit = 800000

[features]
multi_agent = true

[mechanisms]
search_before_ask = true
high_agency_execution = true
git_backed_memory = true

[memory]
directory = ".codex-harness/memory"
sync_transport = "git"
remote_store = "github"
team_mode = "shared-repo"

[delivery]
expansion_level_mode = "explicit_only"
delivery_stop_rule = "codex_default_unless_level_explicit"

[level_10_budget]
wall_clock_limit_minutes = 120
token_limit = 800000
parallel_limit = 6
